name: Build postmarketOS for Gauguin

on:
  workflow_dispatch: # ম্যানুয়ালি বিল্ড শুরু করার জন্য অপশন

jobs:
  build_pmOS:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y pmbootstrap python3 openssl
          # pmbootstrap এর জন্য প্রয়োজনীয় ডিরেক্টরি তৈরি
          mkdir -p ~/.local/var/pmbootstrap

      - name: Initialize pmbootstrap
        run: |
          # এখানে edge চ্যানেল এবং Phosh (মোবাইল ফ্রেন্ডলি UI) ব্যবহার করা হয়েছে
          pmbootstrap init <<EOF
          /home/runner/.local/var/pmbootstrap
          edge
          xiaomi
          gauguin
          
          
          phosh
          
          
          
          EOF

      - name: Build Rootfs and Kernel
        run: |
          # ইমেজ তৈরির কমান্ড
          pmbootstrap install --no-fsprogs

      - name: Export Flashable Artifacts
        run: |
          # ফাইলগুলো এক্সপোর্ট করে একটি নির্দিষ্ট ফোল্ডারে রাখা
          pmbootstrap export
          mkdir -p output
          cp /tmp/postmarketOS-export/* output/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: postmarketOS-Gauguin-Image
          path: output/
          if-no-files-found: error
          overwrite: true
          retention-days: 5
          
